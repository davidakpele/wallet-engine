version: "3.9"

services:
  wallet-engine:
    build: .
    ports:
      - "50051:50051"
      - "9090:9090"
    environment:
      WALLET__SERVER__HOST: "0.0.0.0"
      WALLET__SERVER__PORT: "50051"
      WALLET__DATABASE__URL: "postgres://wallet:wallet@postgres:5432/wallet_db"
      WALLET__DATABASE__MAX_CONNECTIONS: "20"
      WALLET__RABBITMQ__URL: "amqp://guest:guest@rabbitmq:5672"
      WALLET__METRICS__HOST: "0.0.0.0"
      WALLET__METRICS__PORT: "9090"
      WALLET__RATE_LIMIT__REQUESTS_PER_SECOND: "10000"
      RUST_LOG: "wallet_engine=info,sqlx=warn"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB:       wallet_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - wallet-engine
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pg_data:
  rmq_data:
  grafana_data: